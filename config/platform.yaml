# MultiTF Platform Configuration
# Override any value with environment variable: MULTITF_<SECTION>__<KEY>

environment: paper  # research | paper | live

canonical_timezone: UTC
reporting_timezone: Europe/Lisbon
risk_reset_timezone: UTC

strategy:
  name: MultiTF
  version: "1.0.0"
  package: multitf_platform.strategy.frozen.v1_0_0
  symbol: XAUUSD
  entry_timeframe: H1
  confirmation_timeframe: H4
  h1_lookback: 100
  h4_lookback: 50
  require_native_h4: true
  allow_internal_resample: false

risk_wrapper:
  version: "1.1.0"
  enabled: true
  volatility_gate:
    enabled: true
    atr_lookback_bars: 252
    realized_vol_lookback_bars: 100
    allow_atr_percentile_min: 20.0
    allow_atr_percentile_max: 80.0
    block_new_trades_atr_percentile_above: 85.0
    flatten_positions_atr_percentile_above: 95.0
    block_new_trades_atr_percentile_below: 15.0
  spread_filter:
    enabled: true
    max_spread_multiple_of_median: 1.5
    median_lookback_bars: 96
  slippage_filter:
    enabled: true
    max_expected_slippage_bps: 10.0
  flip_filter:
    enabled: true
    lookback_bars: 48
    max_signal_flips: 3
    cooldown_bars: 24
  trade_throttle:
    enabled: true
    max_trades_per_day: 2
    max_trades_per_week: 8
    min_bars_between_flips: 4
    cooldown_after_loss_bars: 6
    cooldown_after_three_losses_bars: 24
  sizing:
    base_risk_per_trade_pct: 0.25
    max_risk_per_trade_pct: 0.50
    max_portfolio_heat_pct: 1.0
    target_annualized_vol_pct: 8.0
    min_position_scale: 0.25
    max_position_scale: 1.0
    hard_max_leverage: 1.0
  circuit_breakers:
    daily_loss_stop_pct: 1.0
    weekly_loss_stop_pct: 3.0
    monthly_loss_stop_pct: 6.0
    total_drawdown_warning_pct: 8.0
    total_drawdown_kill_pct: 15.0
    manual_restart_required: true
    flatten_on_kill: true
    block_new_trades_while_killed: true
  execution_protection:
    reject_stale_quotes: true
    stale_quote_max_age_seconds: 5
    reject_during_disconnect: true
    reject_unknown_spread: true
    require_order_check: true
  weekend_policy:
    block_new_positions_before_weekend_minutes: 60
    flatten_high_risk_positions_before_weekend: true

broker:
  adapter: paper
  symbol: XAUUSD.s
  initial_equity: 10000.0
  leverage: 1000
  account_currency: USD
  execution_mode: quote_replay
  commission_per_lot: 7.0
  spread_source: data
  min_lot_size: 0.01
  lot_step: 0.01
  slippage_pips_mean: 0.5
  slippage_pips_std: 0.3
